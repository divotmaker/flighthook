name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libxdo-dev libatk1.0-dev libglib2.0-dev

      - name: Build WASM UI
        run: cd ui && trunk build --release

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  publish:
    name: Publish lib crate
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94

      - uses: Swatinem/rust-cache@v2

      - name: Verify tag matches Cargo.toml version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          cargo_version=$(grep '^version' lib/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$tag" != "$cargo_version" ]; then
            echo "::error::Tag v${tag} does not match lib/Cargo.toml version ${cargo_version}"
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish -p flighthook --all-features
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  version-bump:
    name: Version bump
    needs: [test, publish]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump to next patch version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          for toml in app/Cargo.toml ui/Cargo.toml lib/Cargo.toml; do
            sed -i "s/^version = \".*\"/version = \"${NEXT_VERSION}\"/" "$toml"
          done
          echo "NEXT_VERSION=${NEXT_VERSION}" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/Cargo.toml ui/Cargo.toml lib/Cargo.toml
          git commit -m "chore: prepare for next release (${NEXT_VERSION})"
          git push

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux
            target: x86_64-unknown-linux-gnu
            artifact: flighthook
            asset_name: flighthook-linux-x86_64
          - name: windows
            target: x86_64-pc-windows-gnu
            artifact: flighthook.exe
            asset_name: flighthook-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@1.94
        with:
          targets: wasm32-unknown-unknown,${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install trunk
        uses: jetli/trunk-action@v0.5.0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxdo-dev libatk1.0-dev libglib2.0-dev

      - name: Install mingw-w64
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get install -y mingw-w64

      - name: Build WASM UI
        run: cd ui && trunk build --release

      - name: Build release binary
        run: cd app && cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp flighthook-linux-x86_64/flighthook dist/flighthook-linux-x86_64
          cp flighthook-windows-x86_64.exe/flighthook.exe dist/flighthook-windows-x86_64.exe
          chmod +x dist/flighthook-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/flighthook-windows-x86_64.exe
            dist/flighthook-linux-x86_64
